services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: python_editor
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      - db
    volumes:
      - ./backend/app:/app/app
      - ./python_editor:/app/app/ml/python_editor
      - ./data:/app/app/ml/data
      - ./recommendation_data:/app/app/ml/recommendation_data
      - /mnt/ssd/ME/ML_files/python-editor/Python-Editor/notebooks/models/mlflow:/mnt/ssd/ME/ML_files/python-editor/Python-Editor/notebooks/models/mlflow

# Note: no named volumes defined so the DB is ephemeral and removed with `down -v`.
