services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: python_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/app:/app/app
      - ./python_editor:/app/app/ml/python_editor
      - ./data:/app/app/ml/data
      - ./recommendation_data:/app/app/ml/recommendation_data
      - /mnt/ssd/ME/ML_files/python-editor/Python-Editor/notebooks/models/mlflow:/mnt/ssd/ME/ML_files/python-editor/Python-Editor/notebooks/models/mlflow


  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
